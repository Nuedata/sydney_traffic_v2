<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sydney Smart Transit Weather Dashboard</title>
    <!-- Tailwind Framework -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Bulletproof fallback classes to guarantee visual toggle works instantly */
        .btn-active {
            background-color: #10b981 !important; /* Emerald 500 */
            color: #020617 !important; /* Slate 950 */
            font-weight: 600;
        }
        .btn-inactive {
            background-color: #334155 !important; /* Slate 700 */
            color: #cbd5e1 !important; /* Slate 300 */
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center p-4 sm:p-6">

    <div class="max-w-2xl w-full bg-slate-800 shadow-xl rounded-2xl p-6 mt-6 border border-slate-700/80">
        <!-- Header Info -->
        <div class="flex justify-between items-start border-b border-slate-700/60 pb-4 mb-6">
            <div>
                <h1 class="text-2xl font-bold text-emerald-400 tracking-tight">🌤️ Sydney Hubs Climate Analytics</h1>
                <p class="text-xs text-slate-400 mt-1">Live environmental micro-data across key transport zones via Open-Meteo.</p>
            </div>
            <span class="bg-slate-700 text-slate-300 text-[10px] uppercase tracking-wider px-2 py-1 rounded font-mono font-bold border border-slate-600">
                Keyless Live Data
            </span>
        </div>

        <!-- Filter Component Menu -->
        <div class="mb-6">
            <span class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-2">Filter Hub Classification:</span>
            <div class="flex flex-wrap gap-2">
                <button onclick="filterHubs('all')" id="btn-all" class="px-3 py-1.5 rounded-lg text-xs font-semibold btn-active transition shadow-md cursor-pointer">
                    📍 Show All Hubs
                </button>
                <button onclick="filterHubs('rail')" id="btn-rail" class="px-3 py-1.5 rounded-lg text-xs font-semibold btn-inactive hover:bg-slate-600 transition cursor-pointer">
                    𚊊 Rail Interchanges
                </button>
                <button onclick="filterHubs('ferry')" id="btn-ferry" class="px-3 py-1.5 rounded-lg text-xs font-semibold btn-inactive hover:bg-slate-600 transition cursor-pointer">
                    🚢 Ferry Terminals
                </button>
            </div>
        </div>

        <!-- Dynamic Results Logs Container -->
        <div class="space-y-3" id="weatherLogs">
            <p class="text-center text-sm text-slate-500 animate-pulse py-12">Querying public servers...</p>
        </div>
    </div>

    <script>
        const hubs = [
            { name: "Central Station Hub", lat: -33.8831, lon: 151.2065, type: "rail" },
            { name: "Parramatta Interchange", lat: -33.8169, lon: 151.0034, type: "rail" },
            { name: "Chatswood Interchange", lat: -33.7972, lon: 151.1812, type: "rail" },
            { name: "Circular Quay Wharves", lat: -33.8617, lon: 151.2108, type: "ferry" },
            { name: "Manly Wharf", lat: -33.8001, lon: 151.2847, type: "ferry" }
        ];

        let currentFilter = 'all';
        let cachedWeatherData = {};

        async function fetchAllData() {
            const container = document.getElementById('weatherLogs');
            
            for (const hub of hubs) {
                try {
                    const url = `https://api.open-meteo.com/v1/forecast?latitude=${hub.lat}&longitude=${hub.lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m`;
                    const response = await fetch(url);
                    if (!response.ok) throw new Error();
                    const data = await response.json();
                    
                    cachedWeatherData[hub.name] = data.current;
                } catch (err) {
                    console.error("Error loading network data for: " + hub.name);
                }
            }
            renderUI();
        }

        function filterHubs(type) {
            currentFilter = type;
            
            // Switch structural styles directly via classList to guarantee execution
            ['all', 'rail', 'ferry'].forEach(t => {
                const btn = document.getElementById(`btn-${t}`);
                if (t === type) {
                    btn.classList.add('btn-active');
                    btn.classList.remove('btn-inactive');
                } else {
                    btn.classList.remove('btn-active');
                    btn.classList.add('btn-inactive');
                }
            });

            renderUI();
        }

        function renderUI() {
            const container = document.getElementById('weatherLogs');
            container.innerHTML = ''; 

            const filteredHubs = hubs.filter(h => currentFilter === 'all' || h.type === currentFilter);

            filteredHubs.forEach(hub => {
                const metrics = cachedWeatherData[hub.name];
                
                // Show placeholder dashes if API data is still streaming in
                const temp = metrics ? `${metrics.temperature_2m}°C` : '--°C';
                const wind = metrics ? `${metrics.wind_speed_10m}km/h (${metrics.wind_direction_10m}°)` : '--';
                const humid = metrics ? `${metrics.relative_humidity_2m}%` : '--%';

                const card = document.createElement('div');
                card.className = "bg-slate-750 p-4 rounded-xl border border-slate-700/40 flex justify-between items-center shadow-sm";
                
                card.innerHTML = `
                    <div class="space-y-1">
                        <div class="flex items-center gap-2">
                            <span class="text-xs">${hub.type === 'rail' ? '🚊' : '🚢'}</span>
                            <h3 class="font-semibold text-white text-sm sm:text-base">${hub.name}</h3>
                        </div>
                        <div class="flex flex-wrap gap-x-4 gap-y-1 text-xs text-slate-400 font-mono">
                            <span>💨 Wind: ${wind}</span>
                            <span>💧 Humid: ${humid}</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-xl sm:text-2xl font-bold text-emerald-400 font-mono">${temp}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Trigger immediate sequence
        fetchAllData();
    </script>
</body>
</html>
