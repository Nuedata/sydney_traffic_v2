<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sydney Transport Hubs - Live Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .btn-active {
            background-color: #10b981 !important; /* Emerald 500 */
            color: #020617 !important; /* Slate 950 */
            font-weight: 600;
        }
        .btn-inactive {
            background-color: #334155 !important; /* Slate 700 */
            color: #cbd5e1 !important; /* Slate 300 */
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center p-4 sm:p-6 font-sans">

    <div class="max-w-4xl w-full bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl mt-4">
        
        <!-- Header -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-800 pb-6 mb-6 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300">
                    Sydney Transit Analytics
                </h1>
                <p class="text-xs text-slate-400 mt-1">Live climate data metrics mapped to primary multi-modal transport nodes.</p>
            </div>
            <div class="flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 px-3 py-1.5 rounded-full">
                <span class="w-2 h-2 bg-emerald-400 rounded-full animate-ping"></span>
                <span class="text-xs font-semibold text-emerald-400 uppercase tracking-wider">Live Open-Meteo Feed</span>
            </div>
        </div>

        <!-- Filters Menu -->
        <div class="mb-8">
            <span class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Filter Network Layout:</span>
            <div class="flex flex-wrap gap-2">
                <button onclick="filterHubs('all')" id="btn-all" class="px-4 py-2 rounded-xl text-xs font-semibold btn-active transition cursor-pointer shadow-md">
                    📍 All Terminals
                </button>
                <button onclick="filterHubs('rail')" id="btn-rail" class="px-4 py-2 rounded-xl text-xs font-semibold btn-inactive hover:bg-slate-600 transition cursor-pointer">
                    𚊊 Metro & Rail
                </button>
                <button onclick="filterHubs('ferry')" id="btn-ferry" class="px-4 py-2 rounded-xl text-xs font-semibold btn-inactive hover:bg-slate-600 transition cursor-pointer">
                    🚢 Ferry Wharves
                </button>
            </div>
        </div>

        <!-- Grid Cards Container -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="weatherLogs">
            <!-- Loading Indicator -->
            <div class="col-span-1 md:col-span-2 text-center py-12 text-sm text-slate-500 animate-pulse">
                Building nodes and requesting live payloads...
            </div>
        </div>
    </div>

    <script>
        // Data containing real public domain images of the locations
        const hubs = [
            { 
                name: "Central Station Hub", 
                lat: -33.8831, lon: 151.2065, 
                type: "rail",
                img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSf0_TRxGresmBuP3biSFPKsDAhcqiAcECdfCLNtlwVUeMSMaeYuJDHdyU&s=10"
            },
            { 
                name: "Circular Quay Wharves", 
                lat: -33.8617, lon: 151.2108, 
                type: "ferry",
                img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQPt9K8bWGnFASsqCq-XmGYOe8j0-18XgG76Qk5UdCEm9RvYq_t_Xv_Nqw&s=10"
            },
            { 
                name: "Manly Wharf Terminal", 
                lat: -33.8001, lon: 151.2847, 
                type: "ferry",
                img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTH7OKlwfySrrctNq6CqzWoLXrRNZJ1tsij8VGIdCwo2PvcWvckmQlpSq_b&s=10"
            },
            { 
                name: "Parramatta Interchange", 
                lat: -33.8169, lon: 151.0034, 
                type: "rail",
                img: "https://images.unsplash.com/photo-1590483736622-39da8af75bba?auto=format&fit=crop&w=300&q=80"
            }
        ];

        let currentFilter = 'all';
        let cachedWeatherData = {};

        async function fetchAllData() {
            for (const hub of hubs) {
                try {
                    const url = `https://api.open-meteo.com/v1/forecast?latitude=${hub.lat}&longitude=${hub.lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m`;
                    const response = await fetch(url);
                    if (!response.ok) throw new Error();
                    const data = await response.json();
                    cachedWeatherData[hub.name] = data.current;
                } catch (err) {
                    console.error("Error fetching data for " + hub.name);
                }
            }
            renderUI();
        }

        function filterHubs(type) {
            currentFilter = type;
            ['all', 'rail', 'ferry'].forEach(t => {
                const btn = document.getElementById(`btn-${t}`);
                if (btn) {
                    if (t === type) {
                        btn.classList.add('btn-active');
                        btn.classList.remove('btn-inactive');
                    } else {
                        btn.classList.remove('btn-active');
                        btn.classList.add('btn-inactive');
                    }
                }
            });
            renderUI();
        }

        function renderUI() {
            const container = document.getElementById('weatherLogs');
            container.innerHTML = ''; 

            const filteredHubs = hubs.filter(h => currentFilter === 'all' || h.type === currentFilter);

            filteredHubs.forEach(hub => {
                const metrics = cachedWeatherData[hub.name];
                const temp = metrics ? `${metrics.temperature_2m}°C` : '--°C';
                const wind = metrics ? `${metrics.wind_speed_10m} km/h` : '--';
                const humid = metrics ? `${metrics.relative_humidity_2m}%` : '--';

                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden flex flex-col sm:flex-row hover:border-slate-700 transition duration-300 shadow-lg";
                
                card.innerHTML = `
                    <!-- Image Area -->
                    <div class="sm:w-1/3 h-32 sm:h-auto relative bg-slate-850">
                        <img src="${hub.img}" alt="${hub.name}" class="w-full h-full object-cover">
                        <span class="absolute top-2 left-2 px-2 py-0.5 text-[9px] font-bold uppercase rounded tracking-wider ${
                            hub.type === 'rail' ? 'bg-blue-500/80 text-white' : 'bg-teal-500/80 text-slate-950'
                        }">
                            ${hub.type === 'rail' ? 'Train/Metro' : 'Ferry'}
                        </span>
                    </div>
                    <!-- Info Metrics Area -->
                    <div class="p-4 flex-1 flex flex-col justify-between bg-gradient-to-br from-slate-900 to-slate-900/60">
                        <div>
                            <h3 class="font-bold text-white text-base tracking-tight mb-2">${hub.name}</h3>
                            <div class="grid grid-cols-2 gap-2 text-xs text-slate-400 font-mono">
                                <div class="bg-slate-950/40 p-1.5 rounded border border-slate-800/60">
                                    <span class="block text-[9px] text-slate-500 uppercase">Wind Velocity</span>
                                    <span class="text-slate-300 font-semibold">${wind}</span>
                                </div>
                                <div class="bg-slate-950/40 p-1.5 rounded border border-slate-800/60">
                                    <span class="block text-[9px] text-slate-500 uppercase">Humidity</span>
                                    <span class="text-slate-300 font-semibold">${humid}</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-right mt-3 pt-2 border-t border-slate-800/40">
                            <span class="text-2xl font-black text-emerald-400 font-mono">${temp}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        fetchAllData();
    </script>
</body>
</html>
