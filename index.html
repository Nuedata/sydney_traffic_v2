<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sydney Hubs Live Weather (No-Key API)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center p-6">

    <div class="max-w-xl w-full bg-slate-800 shadow-xl rounded-2xl p-6 mt-10 border border-slate-700">
        <h1 class="text-2xl font-bold text-emerald-400 mb-1">🌤️ Sydney Hubs Weather Monitor</h1>
        <p class="text-xs text-slate-400 mb-6">Fetching live metrics using the open-source, keyless Open-Meteo API.</p>

        <div class="space-y-4" id="weatherLogs">
            <!-- Data will load here dynamically -->
            <p class="text-center text-sm text-slate-500 animate-pulse">Loading live conditions...</p>
        </div>
    </div>

    <script>
        // Coordinates for main Sydney transport hubs
        const hubs = [
            { name: "Central Station", lat: -33.8831, lon: 151.2065 },
            { name: "Circular Quay", lat: -33.8617, lon: 151.2108 },
            { name: "Parramatta Interchange", lat: -33.8169, lon: 151.0034 },
            { name: "Chatswood Interchange", lat: -33.7972, lon: 151.1812 }
        ];

        async function fetchHubWeather() {
            const container = document.getElementById('weatherLogs');
            container.innerHTML = ''; // Clear loading text

            for (const hub of hubs) {
                try {
                    const url = `https://api.open-meteo.com/v1/forecast?latitude=${hub.lat}&longitude=${hub.lon}&current=temperature_2m,wind_speed_10m`;
                    const response = await fetch(url);
                    
                    if (!response.ok) throw new Error("Network issue");
                    const data = await response.json();

                    // Render weather block
                    const row = document.createElement('div');
                    row.className = "flex justify-between items-center bg-slate-750 p-4 rounded-xl border border-slate-700/50 hover:border-emerald-500/30 transition";
                    row.innerHTML = `
                        <div>
                            <h3 class="font-semibold text-white">${hub.name}</h3>
                            <p class="text-xs text-slate-400">💨 Wind: ${data.current.wind_speed_10m} km/h</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xl font-bold text-emerald-400">${data.current.temperature_2m}°C</span>
                        </div>
                    `;
                    container.appendChild(row);

                } catch (err) {
                    console.error(err);
                }
            }
        }

        // Run on page load
        fetchHubWeather();
    </script>
</body>
</html>
